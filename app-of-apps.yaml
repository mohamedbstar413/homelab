apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: various-app-of-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/mohamedbstar413/homelab.git
    targetRevision: main
    path: utils-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: ""

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true