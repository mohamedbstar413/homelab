apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      - name: external
        port: 9094
        type: ingress
        tls: true
        configuration:
          bootstrap:
            host: kafka.demo.local
          brokers:
            - broker: 3
              host: broker-3.demo.local
    authorization:
      type: simple
      superUsers:
        - CN=kafka-admin
        - admin
  entityOperator:
    topicOperator:
      reconciliationIntervalMs: 60000
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      logging:
        type: inline
        loggers:
          rootLogger.level: INFO
    userOperator:
      reconciliationIntervalMs: 60000
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      logging:
        type: inline
        loggers:
          rootLogger.level: INFO
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m
    logging: info
    enableSaramaLogging: false
  clusterCa:
    generateCertificateAuthority: true
    validityDays: 3650
    renewalDays: 30
    certificateExpirationPolicy: replace-key
  clientsCa:
    generateCertificateAuthority: true
    validityDays: 365
    renewalDays: 30
    certificateExpirationPolicy: replace-key