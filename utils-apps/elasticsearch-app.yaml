apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mohamedbstar413/homelab.git
    targetRevision: main
    path: utils/elasticsearch

  destination:
    server: https://kubernetes.default.svc
    namespace: 'elk'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true