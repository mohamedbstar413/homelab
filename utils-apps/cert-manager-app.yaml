apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mohamedbstar413/homelab.git
    targetRevision: main
    path: utils/cert-manager

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: 'cert-manager'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true