apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
      tier: backend
  template:
    metadata:
      labels:
        app: api-gateway
        tier: backend
    spec:
      containers:
        - name: api-gateway
          image: bstar999/api-gateway:latest
          ports:
            - containerPort: 4004
              name: http
          env:
            - name: SPRING_APPLICATION_NAME
              value: "api-gateway"
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-server:8888" # optional if you use config server
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.backend.svc.cluster.local:8080"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"