apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch-cluster
spec:
  version: 8.13.0
  nodeSets:
    - name: masters
      count: 1
      config:
        node.roles: ["master"]

      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce

            storageClassName: standard

            resources:
              requests:
                storage: 3Gi
      
    - name: data
      count: 1
      config:
        node.roles: ["data"]
      
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce

            storageClassName: standard

            resources:
              requests:
                storage: 3Gi

